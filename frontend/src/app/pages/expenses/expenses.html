<div class="header">
  <h2>Expenses</h2>
  <div class="header-actions">
    <button mat-stroked-button (click)="exportCsv()">
      <mat-icon>download</mat-icon> Export CSV
    </button>
    <a mat-raised-button color="primary" routerLink="/add-expense">Add Expense</a>
    <button mat-icon-button (click)="help.open('expenses')"><mat-icon>help_outline</mat-icon></button>
  </div>
</div>

<form [formGroup]="filters" class="filters">
  <mat-form-field>
    <mat-label>Search</mat-label>
    <input matInput formControlName="search" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Category</mat-label>
    <mat-select formControlName="category">
      <mat-option value="">All</mat-option>
      @for (c of categories; track c) {
        <mat-option [value]="c"><app-category-label [value]="c" /></mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Payment Method</mat-label>
    <mat-select formControlName="paymentMethod">
      <mat-option value="">All</mat-option>
      @for (p of paymentMethods; track p) {
        <mat-option [value]="p">{{ p | enumLabel }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>From</mat-label>
    <input matInput [matDatepicker]="fromPicker" formControlName="from" />
    <mat-datepicker-toggle matIconSuffix [for]="fromPicker" />
    <mat-datepicker #fromPicker />
  </mat-form-field>

  <mat-form-field>
    <mat-label>To</mat-label>
    <input matInput [matDatepicker]="toPicker" formControlName="to" />
    <mat-datepicker-toggle matIconSuffix [for]="toPicker" />
    <mat-datepicker #toPicker />
  </mat-form-field>

  <button mat-stroked-button (click)="clearFilters()">
    <mat-icon>clear</mat-icon> Clear
  </button>
</form>

<table mat-table [dataSource]="expenses()" matSort (matSortChange)="onSort($event)">
  <ng-container matColumnDef="title">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="title">Title</th>
    <td mat-cell *matCellDef="let e">{{ e.title }}</td>
  </ng-container>
  <ng-container matColumnDef="category">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="category">Category</th>
    <td mat-cell *matCellDef="let e"><app-category-label [value]="e.category" /></td>
  </ng-container>
  <ng-container matColumnDef="amount">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="amount">Amount</th>
    <td mat-cell *matCellDef="let e">{{ e.amount | currency }}</td>
  </ng-container>
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef mat-sort-header="date">Date</th>
    <td mat-cell *matCellDef="let e">{{ e.date }}</td>
  </ng-container>
  <ng-container matColumnDef="paymentMethod">
    <th mat-header-cell *matHeaderCellDef>Payment</th>
    <td mat-cell *matCellDef="let e">{{ e.paymentMethod | enumLabel }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef></th>
    <td mat-cell *matCellDef="let e">
      <button mat-icon-button [routerLink]="['/expenses/edit', e.id]">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(e.id)">
        <mat-icon>delete</mat-icon>
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns"></tr>
  <tr mat-row *matRowDef="let row; columns: columns"></tr>
</table>

<mat-paginator
  [length]="total()"
  [pageSize]="pageSize()"
  [pageSizeOptions]="[5, 10, 25, 50]"
  (page)="onPage($event)"
  showFirstLastButtons />
